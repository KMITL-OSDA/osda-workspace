<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSDA - Front Desk Pro</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --kmitl: #ea580c; --dark: #1e293b; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px 0; }
        @media (min-width: 640px) { body { padding: 20px 0; } }

        .app-container { max-width: 900px; margin: 0 auto; background-color: #ffffff; min-height: 90vh; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; position: relative; }
        
        .input-box { 
            width: 100%; padding: 14px 16px; border-radius: 16px; 
            border: 1.5px solid #f1f5f9; font-size: 15px; outline: none; 
            background-color: #f8fafc; color: #334155; transition: all 0.2s ease; 
        }
        .input-box:focus:not([readonly]) { 
            border-color: #fdba74; background: #ffffff; 
            box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.05); 
        }
        .input-box[readonly], .input-box:disabled { 
            background-color: #f1f5f9; cursor: not-allowed; color: #64748b; 
            font-weight: bold; border-color: transparent; 
        }
        .form-label { 
            font-size: 11.5px; font-weight: 700; color: #94a3b8; 
            margin-bottom: 8px; margin-left: 6px; text-transform: uppercase; 
            letter-spacing: 0.05em; display: block; 
        }
        .btn-submit { 
            background: linear-gradient(135deg, #f97316, #ea580c); 
            color: white; width: 100%; font-weight: 800; padding: 16px; 
            border-radius: 16px; border: none; cursor: pointer; margin-top: 10px; 
            box-shadow: 0 6px 20px -4px rgba(234, 88, 12, 0.4);
            transition: all 0.2s ease;
        }
        .btn-submit:active { transform: scale(0.97); box-shadow: 0 2px 10px -2px rgba(234, 88, 12, 0.3); }

        #f_seq {
            background-color: #fff7ed !important; 
            border: 3px solid #ea580c !important; 
            font-size: 32px !important;
            font-weight: 900 !important;
            padding: 16px !important;
            border-radius: 16px !important;
            color: #ea580c !important; 
            width: 100%;
            text-align: center !important;
            letter-spacing: 2px !important;
            box-shadow: 0 4px 10px rgba(234, 88, 12, 0.1) !important;
            outline: none !important;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace !important;
        }

        .page-section { display: none; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }
        @media (prefers-reduced-motion: reduce) { .page-section { animation: none; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .table-row-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .row-normal { background-color: #f8fafc; }
        .row-normal:hover { background-color: #f0fdf4; border-left: 4px solid #22c55e; transform: scale(1.005); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.08); z-index: 10; position: relative; }
        .row-backfill { background-color: #fffbeb; }
        .row-backfill:hover { background-color: #fef3c7; border-left: 4px solid #eab308; transform: scale(1.005); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.08); z-index: 10; position: relative; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100">

<div class="app-container">
    
    <!-- 🌟 PAGE 1: HUB -->
    <div id="pageHub" class="page-section active" style="position: relative;">
        
        <div style="position: absolute; top: 16px; right: 16px; z-index: 999; display: flex; gap: 8px;">
            <!-- ปุ่มออกจากระบบ กลับไปหน้า Login -->
            <button onclick="handleLogout()" class="flex items-center justify-center w-10 h-10 rounded-full bg-white border border-slate-200 shadow-sm cursor-pointer hover:bg-red-50 text-red-500 transition-colors" title="ออกจากระบบ / กลับหน้าหลัก">
                <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
            </button>
            <!-- ปุ่มตั้งค่าระบบ URL -->
            <button onclick="openSettingsModal()" class="flex items-center justify-center w-10 h-10 rounded-full bg-white border border-slate-200 shadow-sm cursor-pointer hover:bg-slate-50 transition-colors" title="ตั้งค่าระบบหลังบ้าน">
                <i data-lucide="settings" class="text-orange-500 hover:rotate-45 transition-transform duration-300" style="width: 20px; height: 20px;"></i>
            </button>
        </div>
        
        <div class="p-5 sm:p-8 border-b border-slate-100 bg-white">
           
            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-6 sm:mb-8">
                <div class="pr-32 sm:pr-0">
                    <h1 class="text-2xl sm:text-3xl font-black text-slate-800 leading-none">
                        OSDA <span class="text-orange-600">FRONT</span>
                    </h1>
                    <p class="text-xs font-bold text-slate-400 mt-1">ระบบลงทะเบียนหนังสือรับ</p>
                    <div id="currentUserBadge" class="text-[11px] text-emerald-600 font-bold mt-1.5 flex items-center gap-1 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100 w-fit">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span id="txtCurrentUser">กำลังตรวจสอบสิทธิ์...</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                <button onclick="openForm('new')" class="bg-emerald-600 hover:bg-emerald-700 text-white p-4 sm:p-6 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-emerald-600/30 transition-all transform hover:-translate-y-1">
                    <i data-lucide="check-circle" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                    <span class="text-lg sm:text-xl font-bold">รับหนังสือปกติ</span>
                </button>
                <button onclick="openForm('backfill')" class="bg-amber-500 hover:bg-amber-600 text-white p-4 sm:p-6 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-amber-500/30 transition-all transform hover:-translate-y-1">
                    <i data-lucide="history" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                    <span class="text-lg sm:text-xl font-bold">รับหนังสือย้อนหลัง</span>
                </button>
            </div>
        </div>

        <div class="bg-slate-50 p-4 sm:p-8 min-h-[500px]">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end border-b-2 border-slate-800 pb-3 mb-4 sm:mb-6 gap-3 sm:gap-4">
                <h3 class="text-sm font-black text-slate-500 tracking-wider uppercase flex items-center gap-2">
                    <i data-lucide="database" class="w-4 h-4"></i> ทะเบียนรับทั้งหมด
                </h3>
                <div class="flex gap-2 w-full sm:w-auto">
                    <div class="relative w-full sm:w-80">
                        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ค้นหา เรื่อง, ทะเบียน, จาก, ถึง..." class="w-full pl-9 pr-4 py-2.5 bg-white border border-slate-300 rounded-xl text-sm focus:border-orange-500 focus:ring-2 focus:ring-orange-100 outline-none shadow-sm transition-all">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-slate-400"></i>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-slate-200">
                <div class="min-w-[800px]">
                    <div class="bg-[#1e293b] text-white text-xs font-bold p-3 grid grid-cols-12 gap-4 items-center">
                        <div class="col-span-2 text-center">ทะเบียน</div>
                        <div class="col-span-4">รายละเอียดหนังสือ</div>
                        <div class="col-span-2 text-center">สถานะ</div>
                        <div class="col-span-2 text-center">เวลารับจริง</div>
                        <div class="col-span-2 text-center">จัดการ</div>
                    </div>
                    <div id="recordList" class="flex flex-col divide-y divide-slate-100">
                    </div>
                </div>
            </div>
            
            <div id="paginationControls" class="flex justify-between items-center mt-6">
                <button onclick="changePage(-1)" id="btnPrev" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-600 disabled:opacity-30 hover:bg-slate-50 transition shadow-sm">ก่อนหน้า</button>
                <span id="pageInfo" class="text-xs font-bold text-slate-500 bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm"></span>
                <button onclick="changePage(1)" id="btnNext" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-600 disabled:opacity-30 hover:bg-slate-50 transition shadow-sm">ถัดไป</button>
            </div>
        </div>
    </div>

    <!-- 🌟 PAGE 2: FORM -->
    <div id="pageForm" class="page-section bg-white min-h-full pb-10">
        <div class="flex items-center gap-3 sm:gap-4 p-4 sm:p-6 border-b border-slate-100 sticky top-0 bg-white z-10 shadow-sm">
            <button onclick="goHome()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-600 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 id="formTitle" class="font-bold text-lg sm:text-xl text-slate-800">บันทึกรับหนังสือ</h2>
            
            <div class="ml-auto">
                <div id="formStatusBadge" class="px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-wider border"></div>
                <input type="hidden" id="f_status">
            </div>
        </div>

        <form id="docForm" onsubmit="saveData(event)" class="p-4 sm:p-8 space-y-4 max-w-2xl mx-auto">
            <input type="hidden" id="f_id">
            
            <!-- เลขทะเบียนรับ -->
            <div>
                <div class="flex justify-between items-end mb-1 px-1">
                    <label class="form-label !mb-0">เลขทะเบียนรับ (อัตโนมัติ)</label>
                    <button type="button" id="btnReuseSeq" onclick="checkAndReuseDeletedSeq()" class="px-2 py-1 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded-lg text-[10px] font-black flex items-center gap-1 shadow-sm transition-all whitespace-nowrap">
                        <i data-lucide="list-restart" class="w-3 h-3"></i> ดึงเลขที่ว่าง
                    </button>
                </div>
                <input type="text" id="f_seq" readonly>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div><label class="form-label">ลงวันที่รับจริง</label><input type="date" id="f_logDate" class="input-box font-bold" required onchange="calculateSequence()"></div>
                <div><label class="form-label">เวลารับจริง</label><input type="time" id="f_logTime" class="input-box font-bold" required></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div><label class="form-label">จาก (ผู้ส่ง)</label><input type="text" id="f_sender" class="input-box" required placeholder="ระบุหน่วยงานหรือผู้ส่ง..."></div>
                <div><label class="form-label">ถึง (ผู้รับ)</label><input type="text" id="f_receiver" class="input-box" required placeholder="ระบุผู้รับปลายทาง..."></div>
            </div>
            
            <div><label class="form-label">เรื่อง</label><input type="text" id="f_subject" class="input-box font-bold" required placeholder="ระบุชื่อเรื่องหรือวัตถุประสงค์..."></div>
            <div><label class="form-label">หมายเหตุ / การปฏิบัติ</label><input type="text" id="f_remark" class="input-box" placeholder="(ถ้ามี)"></div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border-t border-slate-100 pt-4 mt-2">
                <div><label class="form-label">วันที่บันทึก (System Date)</label><input type="date" id="f_sysDate" class="input-box text-xs !text-slate-400" readonly></div>
                <div><label class="form-label">เวลาบันทึก (System Time)</label><input type="time" step="1" id="f_sysTime" class="input-box text-xs !text-slate-400" readonly></div>
            </div>
            
            <!-- 🌟 ส่วนการแนบไฟล์ที่รองรับการลากวาง (Drag & Drop) และใช้ ImgBB -->
            <div class="pt-2">
                <label class="form-label">แนบรูปภาพเอกสาร (ถ้ามี)</label>
                <div id="dropZone" class="p-6 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300 text-center hover:bg-slate-100 transition-all cursor-pointer relative group" onclick="document.getElementById('f_fileInput').click()">
                    <!-- ยอมรับเฉพาะภาพ -->
                    <input type="file" id="f_fileInput" class="hidden" accept="image/*">
                    <div class="flex flex-col items-center justify-center gap-3 pointer-events-none">
                        <div class="bg-white p-3 rounded-full shadow-sm text-blue-500 group-hover:scale-110 transition-transform"><i data-lucide="image" class="w-6 h-6"></i></div>
                        <div>
                            <span class="text-sm font-bold text-slate-600 block">คลิก หรือ ลากไฟล์ภาพมาวางที่นี่</span>
                            <span class="text-[10px] font-medium text-slate-400 mt-1 block">(รองรับเฉพาะไฟล์รูปภาพ JPG, PNG)</span>
                        </div>
                    </div>
                    <!-- ส่วนแสดงรูปพรีวิวเพื่อให้รู้ว่าใส่แล้ว -->
                    <img id="imagePreview" src="" class="w-16 h-16 object-cover rounded-xl border border-slate-200 shadow-sm mx-auto mt-4 hidden" onclick="event.stopPropagation()">
                    <div id="f_fileStatus" class="text-xs text-orange-600 font-bold mt-3"></div>
                </div>
                <!-- ช่องเก็บลิงก์รูป เพื่อส่งไปสร้างสูตรที่หลังบ้าน -->
                <input type="hidden" id="f_fileUrl" value="ไม่มีไฟล์"> 
            </div>
            
            <button type="submit" id="btnSubmit" class="btn-submit flex justify-center items-center gap-2 mt-6">
                <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
            </button>
        </form>
    </div>
</div>

<script>
    // 🚨 ระบบตรวจสอบสิทธิ์ (Auth Guard): ถ้ายังไม่ได้ล็อกอิน ให้เด้งกลับไปหน้าล็อกอิน (index.html) ทันที!
    const isLocalFile = window.location.protocol === 'file:';
    if (!isLocalFile && sessionStorage.getItem('osda_auth') !== 'true') {
        window.location.href = 'index.html';
    }

    // ==========================================
    // ⚙️ ตั้งค่าเริ่มต้น Web App URL และคีย์ ImgBB
    // ==========================================
    let WEB_APP_URL = localStorage.getItem('OSDA_WEB_APP_URL') || "https://script.google.com/macros/s/AKfycbxLD8sWpqYT0lJ7V4xFXjhcIGd6AZF2gAcNeS5egouDU8pid7Dbgt7kCD1d2qnIJQlHMg/exec";
    let IMGBB_API_KEY = localStorage.getItem('OSDA_IMGBB_KEY') || "943c4187147fb6507b61c2c6de104cfa";
    // ==========================================

    localforage.config({ name: 'OSDA_STORAGE' });
    
    // 🌟 เอาการจำค่า cache ใน localStorage ตั้งต้นออก เพื่อล้างผีของเก่าหลอนหน้าจอของทุกคน
    let db = []; 
    let currentMode = 'hub'; 
    let realTimeClock; 
    let currentPage = 1;
    const itemsPerPage = 6; 
    let filteredRecords = []; 

    // ==========================================
    // 🌟 ระบบคลังรายชื่อ (Email Mapping) - ครบถ้วน 13 คน + นาย
    // ==========================================
    const USER_MAPPING = {
        "66040181@kmitl.ac.th": "เขต", // 👈 แก้คีย์อีเมลตรงนี้เป็นอีเมลส่วนตัวของนายเพื่อทดสอบ
        "66040190@kmitl.ac.th": "มดแดง",
        "wiphawan.su@kmitl.ac.th": "พี่วิภาวรรณ สุขดี",
        "surachai.ra@kmitl.ac.th": "พี่สุรชัย รักเรียน",
        "nattapong.du@kmitl.ac.th": "พี่ณัฐพงษ์ ดวงดี",
        "jaruwan.fa@kmitl.ac.th": "พี่จารุวรรณ ใฝ่ดี",
        "thanapon.ud@kmitl.ac.th": "พี่ธนพล อุดมสุข",
        "ketsarin.ja@kmitl.ac.th": "พี่เกศรินทร์ เจริญใจ",
        "pongsatorn.ma@kmitl.ac.th": "พี่พงศธร มั่นคง",
        "ariya.me@kmitl.ac.th": "พี่อารียา เมตตา",
        "theerapong.ru@kmitl.ac.th": "พี่ธีรพงศ์ รุ่งเรือง",
        "siriporn.po@kmitl.ac.th": "พี่ศิริพร พูนผล",
        "manasweekul.ru@kmitl.ac.th": "พี่มนัสวีกุล เรืองฤทธิ์",
        "wanwisa.wo@kmitl.ac.th": "พี่วรรณวิษา วงศ์ทอง"
    };

    function getUserDisplayName(email) {
        if (!email) return "ไม่ระบุตัวตน";
        const cleanEmail = email.toLowerCase().trim();
        // 1. ถ้าเจออีเมลในคลัง ให้คืนค่าชื่อไทยสวยๆ
        if (USER_MAPPING[cleanEmail]) {
            return USER_MAPPING[cleanEmail];
        }
        // 2. ถ้านอกเหนือจากนั้น ตัดเอาแค่ชื่อข้างหน้าเครื่องหมาย @ 
        return cleanEmail.split('@')[0];
    }

    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });

    // ⚙️ ตั้งค่าระบบหลังบ้านและคีย์ ImgBB
    function openSettingsModal() {
        Swal.fire({
            title: '⚙️ ตั้งค่าระบบ',
            html: `
                <div class="text-left space-y-3 p-1">
                    <div>
                        <label class="block text-xs font-black text-slate-500 mb-1">GOOGLE APPS SCRIPT WEB APP URL</label>
                        <input id="swal_web_app_url" class="w-full p-2.5 border rounded-lg text-xs" value="${WEB_APP_URL}" placeholder="https://script.google.com/...">
                    </div>
                    <div class="mt-4">
                        <label class="block text-xs font-black text-blue-500 mb-1">IMGBB API KEY (สำหรับระบบฝากรูปฟรี)</label>
                        <input id="swal_imgbb_key" class="w-full p-2.5 border rounded-lg text-xs" value="${IMGBB_API_KEY}" placeholder="นำ API Key มาวางที่นี่...">
                        <p class="text-[10px] text-slate-400 mt-1">👉 สมัครคีย์ฟรีได้ที่ <a href="https://api.imgbb.com/" target="_blank" class="text-blue-500 underline">api.imgbb.com</a></p>
                    </div>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'บันทึกค่า',
            confirmButtonColor: '#ea580c',
            cancelButtonText: 'ยกเลิก',
            customClass: { popup: 'rounded-2xl' },
            preConfirm: () => {
                return {
                    webAppUrl: document.getElementById('swal_web_app_url').value.trim(),
                    imgbbKey: document.getElementById('swal_imgbb_key').value.trim()
                };
            }
        }).then((result) => {
            if (result.isConfirmed && result.value) {
                const { webAppUrl, imgbbKey } = result.value;
                if (webAppUrl) {
                    localStorage.setItem('OSDA_WEB_APP_URL', webAppUrl);
                    WEB_APP_URL = webAppUrl;
                }
                if (imgbbKey !== undefined) {
                    localStorage.setItem('OSDA_IMGBB_KEY', imgbbKey);
                    IMGBB_API_KEY = imgbbKey;
                }
                Swal.fire({ icon: 'success', title: 'บันทึกค่าเรียบร้อย!', timer: 1000, showConfirmButton: false });
                syncDataFromCloud();
            }
        });
    }

    // 🌟 ดึงข้อมูลจากคีย์ osda_user_email ใน sessionStorage (ซึ่งตรงกับ index.html ส่งมา)
    function updateUserBadge() {
        const userEmail = sessionStorage.getItem('osda_user_email');
        const txtUser = document.getElementById('txtCurrentUser');
        if (txtUser) {
            if (userEmail) {
                const displayName = getUserDisplayName(userEmail);
                txtUser.innerText = `ผู้ปฏิบัติงาน: ${displayName}`;
            } else {
                txtUser.innerText = "ระบบพร้อมใช้งาน (Guest Mode)";
            }
        }
    }

    // 🌟 คืนค่าระบบกลับหน้าแรก และล้างสิทธิ์ session
    function handleLogout() {
        sessionStorage.removeItem('osda_auth');
        sessionStorage.removeItem('osda_user_email');

    function cleanTimeFormat(timeVal) {
        if (!timeVal) return "";
        let str = String(timeVal).trim();
        if (str.includes("GMT") || str.includes("Indochina") || str.includes("1899")) {
            let match = str.match(/\b\d{1,2}:\d{2}(:\d{2})?\b/);
            if (match) {
                let parts = match[0].split(':');
                return parts[0].padStart(2, '0') + ":" + parts[1].padStart(2, '0');
            }
        }
        let match = str.match(/\b\d{1,2}:\d{2}\b/);
        if (match) {
            let parts = match[0].split(':');
            return parts[0].padStart(2, '0') + ":" + parts[1].padStart(2, '0');
        }
        return str;
    }

    async function syncDataFromCloud(isBackground = false) {
        const container = document.getElementById('recordList');
        // แสดง Spinner เฉพาะเมื่อไม่ใช่การรีเฟรชเงียบเบื้องหลัง เพื่อไม่ให้รบกวนสายตาคนทำงาน
        if(container && !isBackground && db.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16 text-blue-600 font-bold flex flex-col items-center justify-center gap-3">
                    <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>กำลังซิงก์ข้อมูลล่าสุดจากส่วนกลาง...</span>
                </div>`;
        }

        try {
            const response = await fetch(`${WEB_APP_URL}?action=getAll&sheetType=receiver`);
            const data = await response.json();
            
            if (data.status === 'success' && data.data) {
                // อัปเดตตัวแปร db ในหน้าจอหลัก
                db = data.data.map(r => ({
                    ...r,
                    creator: String(r.creator || ''),
                    editor: String(r.editor || ''),
                    fileUrl: String(r.hasFile || 'ไม่มีไฟล์')
                })); 
            } else {
                // หากหลังบ้านส่งว่าไม่มีข้อมูลแล้ว ให้เคลียร์หน้าเว็บทั้งหมด
                db = [];
            }
        } catch (err) {
            console.error("Sync Error:", err);
        } finally {
            handleSearch(); 
        }
    }

    async function calculateSequence() {
        if (document.getElementById('f_id').value) return; 
        
        const targetDate = document.getElementById('f_logDate').value;
        if (!targetDate) return;

        const seqEl = document.getElementById('f_seq');
        seqEl.value = "กำลังดึงเลข..."; 

        try {
            const response = await fetch(`${WEB_APP_URL}?action=getSeq&sheetType=receiver&mode=${currentMode}&date=${targetDate}`);
            const data = await response.json();
            
            if (data.status === 'success' && data.seq) {
                seqEl.value = data.seq; 
            } else {
                seqEl.value = "0001"; 
            }
        } catch (err) {
            console.error("Calculate Seq Error:", err);
            seqEl.value = "0001"; 
        }
    }

    // 🌟 ระบบ Drag & Drop และอัปโหลดไฟล์ด้วย ImgBB (เข้ารหัส Base64 แก้บั๊กอัปโหลดไม่เข้า)
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('f_fileInput');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
            dropZone.classList.add('bg-orange-50', 'border-orange-400');
            dropZone.classList.remove('bg-slate-50', 'border-slate-300');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
            dropZone.classList.remove('bg-orange-50', 'border-orange-400');
            dropZone.classList.add('bg-slate-50', 'border-slate-300');
        }, false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
            processFileUpload(files[0]);
        }
    }, false);

    fileInput.addEventListener('change', function(e) {
        if (this.files.length > 0) {
            processFileUpload(this.files[0]);
        }
    });

    async function processFileUpload(file) {
        if (!file) return;
        
        const isImage = file.type.startsWith('image/');

        if (!isImage) {
            Swal.fire({ icon: 'error', title: 'ไฟล์ไม่รองรับ', text: 'ระบบแนบไฟล์นี้ รองรับเฉพาะการอัปโหลดไฟล์รูปภาพ (JPG, PNG) เท่านั้นครับ' });
            fileInput.value = "";
            return;
        }

        if (!IMGBB_API_KEY) {
            Swal.fire({ 
                icon: 'warning', 
                title: 'ยังไม่ได้ตั้งค่าคีย์ฝากรูป', 
                text: 'กรุณากดปุ่มฟันเฟือง ⚙️ ด้านขวาบน เพื่อใส่ IMGBB API KEY ของคุณก่อนครับ' 
            });
            fileInput.value = "";
            return;
        }

        document.getElementById('f_fileStatus').innerHTML = '<span class="text-orange-500 font-bold">⌛ กำลังแปลงและส่งรูปภาพขึ้นคลาวด์...</span>';
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = async function(e) {
            const previewImg = document.getElementById('imagePreview');
            if (previewImg) {
                previewImg.src = e.target.result;
                previewImg.classList.remove('hidden');
            }

            try {
                // แปลงภาพเป็น Base64 เพื่อให้อัปโหลดเข้า ImgBB ได้ 100% ไม่มีบั๊ก
                const base64Image = e.target.result.split(',')[1];
                
                const formData = new FormData();
                formData.append('image', base64Image);

                const uploadUrl = `https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`;
                
                const response = await fetch(uploadUrl, { method: 'POST', body: formData });
                const result = await response.json();

                if (result.success && result.data && result.data.url) {
                    document.getElementById('f_fileUrl').value = result.data.url;
                    document.getElementById('f_fileStatus').innerHTML = `✅ แนบไฟล์สำเร็จ! <br><a href="${result.data.url}" target="_blank" onclick="event.stopPropagation()" class="text-blue-600 underline font-black text-[11px] mt-1 inline-block relative z-10 pointer-events-auto">คลิกเพื่อดูรูปภาพแบบเต็ม</a>`;
                    Toast.fire({ icon: 'success', title: 'อัปโหลดภาพเสร็จสิ้น!' });
                } else {
                    throw new Error("Upload Failed");
                }
            } catch (err) { 
                console.error(err); 
                document.getElementById('f_fileStatus').innerHTML = '<span class="text-red-500 font-bold">❌ อัปโหลดล้มเหลว ตรวจสอบ API Key และลองใหม่อีกครั้ง</span>';
                document.getElementById('imagePreview').classList.add('hidden');
            } finally {
                fileInput.value = ""; // เคลียร์ช่องให้ดรอปไฟล์ซ้ำได้
            }
        };
        
        reader.onerror = function() {
            document.getElementById('f_fileStatus').innerHTML = '<span class="text-red-500 font-bold">❌ เกิดข้อผิดพลาดในการอ่านไฟล์จากเครื่อง</span>';
            fileInput.value = "";
        };
    }

    function formatThaiDateShort(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    window.saveData = async (e) => {
        if (e) e.preventDefault(); 
        
        const getValue = (id) => {
            const el = document.getElementById(id);
            return el ? el.value : "";
        };

        try {
            const fileUrlVal = getValue('f_fileUrl');
            
            Swal.fire({ 
                title: 'กำลังบันทึกข้อมูล...', 
                html: '<b class="text-amber-600">กรุณาอย่าเพิ่งปิดหน้าต่างระบบนี้...</b>',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            const id_value = getValue('f_id');
            const isEdit = id_value ? true : false; 
            const id = isEdit ? id_value : Date.now();

            const savedEmail = sessionStorage.getItem('osda_user_email');
            const userDisplayName = getUserDisplayName(savedEmail); // 🌟 แปลงอีเมลเป็นชื่อไทย (ถ้าไม่มีก็เป็น Guest Mode)

            const record = {
                action: isEdit ? 'edit' : 'save',
                sheetType: 'receiver', 
                id: id,
                seq: getValue('f_seq'),
                sysDate: getValue('f_sysDate'),
                sysTime: getValue('f_sysTime'),
                logDate: getValue('f_logDate'),
                logTime: getValue('f_logTime'),
                sender: getValue('f_sender'),
                receiver: getValue('f_receiver'),
                subject: getValue('f_subject'),
                remark: getValue('f_remark'),
                status: getValue('f_status'),
                user: userDisplayName, // 🌟 ส่งชื่อไทยไปบันทึกลงตาราง
                fileUrl: fileUrlVal 
            };

            const response = await fetch(WEB_APP_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(record)
            });
            
            const result = await response.json();
            
            // 🌟 เช็คว่า Error จากฝั่ง Apps Script (หลังบ้าน) ไหม
            if (result.status === 'success') {
                await Swal.fire({ 
                    icon: 'success', 
                    title: 'สำเร็จ!', 
                    text: 'บันทึกข้อมูลเรียบร้อยแล้ว', 
                    timer: 1500 
                });
                goHome(); 
            } else {
                throw new Error(result.message || 'ระบบหลังบ้านไม่ตอบสนอง');
            }

        } catch (error) {
            console.error(error);
            Swal.fire({ 
                icon: 'error', 
                title: 'เกิดข้อผิดพลาดในการส่งข้อมูล!', 
                text: 'โปรดเช็ค URL หลังบ้าน (สาเหตุ: ' + String(error) + ')' 
            });
        }
    };

    function handleSearch() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        filteredRecords = db.filter(r => 
            (r.subject || '').toLowerCase().includes(q) || 
            (r.seq || '').toLowerCase().includes(q) ||
            (r.sender || '').toLowerCase().includes(q)
        ).sort((a,b) => b.id - a.id);
        
        renderList();
    }

    // ฟังก์ชันเลื่อนหน้าข้อมูลตาราง
    function changePage(step) { currentPage += step; renderList(); }

    function renderList() {
        const container = document.getElementById('recordList');
        if (!container) return;
        
        container.innerHTML = '';
        
        if (filteredRecords.length === 0) {
            container.innerHTML = `<div class="text-center py-12 text-slate-400 font-bold">ไม่พบรายการ</div>`;
            document.getElementById('paginationControls').style.display = 'none';
            return;
        }

        const totalPages = Math.ceil(filteredRecords.length / itemsPerPage);
        
        // 🌟 ป้องกันกรณีที่หน้าปัจจุบันมีเลขหน้าเกินจำนวนหน้าจริงที่มีอยู่ (เช่น หลังลบรายการข้อมูลจนหน้าลดลง)
        if (currentPage > totalPages) {
            currentPage = totalPages || 1;
        }

        document.getElementById('paginationControls').style.display = 'flex';
        document.getElementById('pageInfo').innerText = `หน้า ${currentPage} / ${totalPages}`;
        document.getElementById('btnPrev').disabled = (currentPage === 1);
        document.getElementById('btnNext').disabled = (currentPage === totalPages);
        
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredRecords.slice(start, start + itemsPerPage);
        
        pageItems.forEach((r) => {
            const isBackfill = r.status === 'รับย้อนหลัง' || (r.seq && r.seq.includes('.'));
            const rowClass = isBackfill ? 'row-backfill' : 'row-normal';
            const statusBadge = isBackfill 
                ? `<span class="bg-yellow-100 text-yellow-700 border border-yellow-200 px-3 py-1 rounded-full text-[10px] font-black">รับย้อนหลัง</span>`
                : `<span class="bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-1 rounded-full text-[10px] font-black">รับแล้ว</span>`;

            // 🌟 ปรับปรุงการแสดงผลชื่อผู้บันทึกให้แปลงเป็นชื่อไทยแบบ Real-time ย้อนหลังตลอดเวลา
            const thaiCreator = getUserDisplayName(r.creator);
            const thaiEditor = r.editor ? getUserDisplayName(r.editor) : "";

            let userTrackHtml = '';
            if (thaiCreator) {
                if (thaiEditor && thaiEditor !== thaiCreator) {

                        </div>`;
                } else {

                        <div class="text-[10px] text-slate-400 font-medium mt-1 flex items-center gap-1">
                            <i data-lucide="user" class="w-3 h-3"></i> บันทึกโดย: ${thaiCreator}
                        </div>`;
                }
            }
            
            const hasDriveLink = r.fileUrl && r.fileUrl.startsWith('http');

                : '';

                            <span><b>จาก:</b> ${r.sender || '-'}</span>
                            <span><b>ถึง:</b> ${r.receiver || '-'}</span>
                        </div>
                        ${userTrackHtml}
                    </div>
                    <div class="col-span-2 flex justify-center items-center">${statusBadge}</div>
                    <div class="col-span-2 text-xs text-slate-600 flex flex-col justify-center items-center">
                        <div class="font-bold text-slate-800 mb-0.5">${formatThaiDateShort(r.logDate)}</div>
                        <div class="text-[10px] text-slate-400">เวลา: ${displayTime}</div>

                    <div class="col-span-2 flex flex-row flex-wrap justify-center items-center gap-2">

        } else {
            badge.innerText = 'ปกติ';
            badge.className = "px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wider border bg-emerald-100 text-emerald-700 border-emerald-200";
        }

        document.getElementById('f_fileUrl').value = data.fileUrl || 'ไม่มีไฟล์';
        const previewImg = document.getElementById('imagePreview');

        if(data.fileUrl && data.fileUrl.startsWith('http')) {
            const isPDF = data.fileUrl.toLowerCase().endsWith('.pdf');
            const previewText = isPDF ? 'เปิดดูไฟล์เอกสาร PDF' : 'เปิดดูพรีวิวรูปภาพ';
            document.getElementById('f_fileStatus').innerHTML = `📌 <a href="${data.fileUrl}" target="_blank" onclick="event.stopPropagation()" class="text-blue-600 underline font-black hover:text-blue-800 relative z-10 pointer-events-auto">มีไฟล์เดิมแนบอยู่แล้ว (${previewText})</a><br><span class="text-[10px] text-slate-500 font-normal">หากไม่ต้องการเปลี่ยนไฟล์ใหม่ ไม่ต้องคลิกแนบเพิ่ม</span>`;
            
            if (!isPDF) {
                previewImg.src = data.fileUrl;
                previewImg.classList.remove('hidden');
            } else {
                previewImg.classList.add('hidden');
            }
        } else {
            document.getElementById('f_fileStatus').innerText = "";
            previewImg.classList.add('hidden');
        }
    };

    window.deleteRecord = async (id) => {
        const result = await Swal.fire({
            title: 'ยืนยันการลบข้อมูล?',
            text: "ข้อมูลทะเบียนรับเล่มนี้จะถูกยกเลิก แต่เลขลำดับจะยังถูกเก็บรักษาไว้เพื่อให้ดึงกลับมาใช้ใหม่ได้",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'ใช่, ต้องการลบเลย!',
            cancelButtonText: 'ยกเลิก'
        });

        if (result.isConfirmed) {
            Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'delete', sheetType: 'receiver', id: String(id) }) 
                });
                
                await Swal.fire({ icon: 'success', title: 'ลบสำเร็จ!', timer: 1000, showConfirmButton: false });
                await syncDataFromCloud(); // ดึงข้อมูลชุดสดใหม่จากชีททันทีเพื่ออัปเดตหน้าจอทุกคน
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการทำรายการ!', text: String(error) });
            }
        }
    };

    function checkAndReuseDeletedSeq() {
        let existingSeqs = db.map(item => {
            let num = parseInt(String(item.seq).replace(/[^0-9]/g, ''), 10);
            return isNaN(num) ? null : num;
        }).filter(num => num !== null);

        if (existingSeqs.length === 0) {
            Swal.fire({ icon: 'info', title: 'ไม่พบช่องว่าง', text: 'ปัจจุบันยังไม่มีเลขทะเบียนที่แหว่งในระบบครับ' });
            return;
        }

        let maxSeq = Math.max(...existingSeqs);
        let missingSeqs = [];
        for (let i = 1; i < maxSeq; i++) {
            if (!existingSeqs.includes(i)) {
                missingSeqs.push(String(i).padStart(4, '0'));
            }
        }

        if (missingSeqs.length === 0) {
            Swal.fire({ icon: 'info', title: 'ข้อมูลต่อเนื่องดีอยู่', text: 'ลำดับเลขทะเบียนเรียงครบถ้วน ไม่มีเลขที่ว่างครับ' });
            return;
        }

        let optionsHtml = missingSeqs.map(seq => `<option value="${seq}">ลำดับที่ # ${seq}</option>`).join('');

        Swal.fire({
            title: 'พบเลขทะเบียนที่ว่างอยู่!',
            html: `
                <p class="text-sm text-slate-500 mb-3">คุณสามารถเลือกดึงเลขทะเบียนที่เคยโดนลบไป กลับมาใช้ใหม่ได้ครับ</p>
                <select id="swal_select_seq" class="w-full p-3 border border-slate-300 rounded-xl font-bold text-center text-lg text-slate-800 bg-amber-50">
                    ${optionsHtml}
                </select>
            `,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d97706',
            confirmButtonText: '✅ ตกลง นำเลขนี้มาใช้',
            cancelButtonText: 'ยกเลิก',
            preConfirm: () => { return document.getElementById('swal_select_seq').value; }
        }).then((result) => {
            if (result.isConfirmed && result.value) {
                document.getElementById('f_seq').value = result.value;
            }
        });
    }
</script>
