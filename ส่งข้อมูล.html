<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSDA Document System</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --kmitl-orange: #ea580c; } 
        
        #osda-app-wrapper br, #osda-app-wrapper p:empty { display: none !important; }

        #osda-app-wrapper {
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%) !important; 
            min-height: 100vh; width: 100vw !important; position: relative;
            left: 50%; transform: translateX(-50%); margin: 0; padding: 0;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }
        
        #osda-app-wrapper * { font-family: 'Sarabun', sans-serif !important; box-sizing: border-box !important; }
        #osda-app-wrapper p { margin: 0 !important; padding: 0 !important; line-height: normal !important; }
        body { color: #1e293b; margin: 0; overflow-x: hidden; }
        
        .hub-container { max-width: 500px; margin: auto; padding: 60px 20px 40px 20px !important; min-height: 100vh; position: relative; }
        
        .hub-header-box {
            background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(12px) !important;
            padding: 50px 24px 30px 24px !important; border-radius: 32px !important;
            border: 1px solid #ffffff !important; margin-bottom: 32px !important; 
            box-shadow: 0 12px 35px -5px rgba(0,0,0,0.06), 0 4px 15px rgba(0,0,0,0.02) !important;
            display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important;
        }

        .logo-text-osda {
            font-weight: 900 !important; background: linear-gradient(135deg, #ea580c, #f97316);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: block !important; text-align: center !important;
        }
        .logo-sidebar { font-size: 32px !important; margin-bottom: 10px !important; line-height: 1 !important; }
        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .hub-card { 
            background: linear-gradient(145deg, #ffffff, #fcfcfd); border-radius: 28px; border: 1px solid #ffffff; 
            padding: 24px 12px; display: flex; flex-direction: column; align-items: center; 
            gap: 14px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px -2px rgba(0,0,0,0.03);
        }
        .hub-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -4px rgba(0,0,0,0.06); }
        .hub-card:active { transform: scale(0.96); }

        .hub-card > div:first-child { width: 56px !important; height: 56px !important; border-radius: 20px !important; background-image: linear-gradient(135deg, #fff7ed, #ffedd5) !important; }
        .hub-card:nth-child(2) > div:first-child { background-image: linear-gradient(135deg, #eff6ff, #dbeafe) !important; }
        .hub-card:nth-child(3) > div:first-child { background-image: linear-gradient(135deg, #f0fdf4, #dcfce7) !important; }
        .hub-card:nth-child(4) > div:first-child { background-image: linear-gradient(135deg, #fef2f2, #fee2e2) !important; }
        .hub-card:nth-child(5) > div:first-child { background-image: linear-gradient(135deg, #f0fdfa, #ccfbf1) !important; }
        
        #sidebar {
            position: fixed !important; top: 0 !important; left: -300px; width: 280px !important; height: 100% !important;
            background: white !important; z-index: 999999 !important; transition: 0.3s ease;
            box-shadow: 20px 0 40px rgba(0,0,0,0.08) !important; padding: 40px 15px 30px 15px !important; display: flex !important; flex-direction: column !important;
        }
        #sidebar.open { left: 0 !important; }
        #sidebarOverlay { position: fixed !important; inset: 0 !important; background: rgba(15, 23, 42, 0.4) !important; z-index: 999998 !important; display: none; backdrop-filter: blur(3px) !important; }

        .nav-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 16px; font-weight: 600; font-size: 15px; margin-bottom: 8px; background: transparent; color: #64748b; cursor: pointer; transition: all 0.2s ease; }
        .nav-item:hover { background: #f8fafc; color: #334155; }
        .nav-item.home { background: #f1f5f9; color: #475569; justify-content: center; margin-bottom: 25px; }
        .nav-item.new { color: #ea580c; } .nav-item.backfill { color: #2563eb; } .nav-item.edit { color: #16a34a; } .nav-item.cancel { color: #dc2626; }
        
        #appModal { position: fixed !important; inset: 0 !important; background: #f8fafc !important; z-index: 999990 !important; display: none; overflow-y: auto !important; }

        .app-header { display: flex !important; align-items: center !important; justify-content: space-between !important; padding: 16px 20px !important; background: rgba(255, 255, 255, 0.85) !important; backdrop-filter: blur(12px) !important; border-bottom: 1px solid rgba(0,0,0,0.03) !important; position: sticky !important; top: 0 !important; z-index: 1100 !important; }
        .app-header button { border-radius: 14px !important; border: 1px solid #f1f5f9 !important; background: #ffffff !important; padding: 8px !important; }

        input, textarea, select { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1.5px solid #f1f5f9; font-size: 15px; outline: none; background-color: #f8fafc; color: #334155; transition: all 0.2s ease; }
        input:focus, textarea:focus { border-color: #fdba74; background: #ffffff; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.05); }

        .btn-submit { background: linear-gradient(135deg, #f97316, #ea580c); color: white; width: 100%; font-weight: 800; padding: 16px; border-radius: 18px; border: none; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 20px -4px rgba(234, 88, 12, 0.4); }
        .btn-submit:active { transform: scale(0.97); }
        
        .doc-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 14px; border: 1px solid #ffffff; border-left: 5px solid var(--kmitl-orange); box-shadow: 0 4px 15px -3px rgba(0,0,0,0.03); }
        input:disabled { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }

        #docForm, #listSection > div:first-child { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04) !important; border: 1px solid #ffffff !important; border-radius: 28px !important; padding: 24px !important; background: white !important; }
        .text-xs.font-bold.text-slate-400.mb-1 { font-size: 11.5px !important; text-transform: uppercase !important; margin-bottom: 8px !important; margin-left: 6px !important; color: #94a3b8 !important; }
        
        #seqDisplay { background-color: #fff7ed !important; border-color: #fed7aa !important; font-size: 24px !important; padding: 16px !important; border-radius: 20px !important; box-shadow: inset 0 2px 4px rgba(234, 88, 12, 0.05) !important; font-weight: bold; text-align: center; color: #ea580c; }
    </style>
</head>
<body>

<div id="osda-app-wrapper">
    <div id="main-app">
        <div id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <div id="sidebar">
            <div class="flex flex-col items-center mb-8 pt-4 border-bottom pb-6 border-slate-50">
                <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-lg"><i data-lucide="layout-grid" class="w-8 h-8"></i></div>
                <div class="logo-text-osda logo-sidebar">OSDA</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest -mt-1">Menu Navigation</div>
            </div>
            <nav class="flex-1 flex flex-col">
                <button onclick="goHome()" class="nav-item home"><i data-lucide="home"></i> กลับหน้าหลัก</button>
                <div class="text-[11px] font-bold text-slate-300 px-4 mb-3 uppercase tracking-widest text-center">รายการจัดการ</div>
                <button onclick="switchModule('new')" class="nav-item new"><i data-lucide="plus-circle"></i> บันทึกใหม่</button>
                <button onclick="switchModule('backfill')" class="nav-item backfill"><i data-lucide="history"></i> ย้อนหลัง</button>
                <button onclick="switchModule('edit')" class="nav-item edit"><i data-lucide="pencil"></i> แก้ไขข้อมูล</button>
                <button onclick="switchModule('cancel')" class="nav-item cancel"><i data-lucide="trash-2"></i> ยกเลิกรายการ</button>
                <div class="border-t border-slate-100 my-2"></div>
                <button onclick="exportCurrentMonthToExcel()" class="nav-item text-green-600"><i data-lucide="download"></i> ส่งออก Excel</button>
            </nav>
        </div>

        <div id="hubPage" class="hub-container">
            <div class="hub-header-box">
                <div class="logo-text-osda" style="font-size: 42px !important; line-height: 1 !important; margin: 0 0 5px 0 !important;">OSDA</div>
                <div class="text-2xl font-black text-slate-800 tracking-tight" style="margin: 0 0 5px 0 !important;">DOCS SYSTEM</div>
                <div class="text-slate-400 text-sm">เลือกรายการที่ต้องการดำเนินการ</div>
            </div>
            <div class="hub-grid z-10">
                <div class="hub-card" onclick="openModule('new')"><div class="text-orange-600"><i data-lucide="plus-circle"></i></div><div class="font-bold text-slate-700">บันทึกใหม่</div></div>
                <div class="hub-card" onclick="openModule('backfill')"><div class="text-blue-600"><i data-lucide="history"></i></div><div class="font-bold text-slate-700">ย้อนหลัง</div></div>
                <div class="hub-card" onclick="openModule('edit')"><div class="text-green-600"><i data-lucide="pencil"></i></div><div class="font-bold text-slate-700">แก้ไขข้อมูล</div></div>
                <div class="hub-card" onclick="openModule('cancel')"><div class="text-red-600"><i data-lucide="trash-2"></i></div><div class="font-bold text-slate-700">ยกเลิกรายการ</div></div>
                <div class="hub-card" onclick="exportCurrentMonthToExcel()"><div class="text-green-600"><i data-lucide="download"></i></div><div class="font-bold text-slate-700 text-center">ส่งออก Excel<br><span class="text-[10px] text-slate-400">ประจำเดือนปัจจุบัน</span></div></div>
            </div>
        </div>

        <div id="appModal">
            <header class="app-header">
                <button onclick="toggleSidebar()"><i data-lucide="menu" class="w-6 h-6 text-slate-600"></i></button>
                <div id="moduleTitle" class="font-bold text-slate-800 text-lg uppercase">TITLE</div>
                <div class="w-10"></div>
            </header>

            <div class="p-5 max-w-[500px] mx-auto">
                <div id="formSection" style="display:none;">
                    <form id="docForm" class="space-y-4">
                        <input type="hidden" id="editId">
                        <div class="grid grid-cols-2 gap-3">
                            <div><div class="text-xs font-bold text-slate-400 mb-1">จาก (ผู้จัดทำ)</div><input type="text" id="fromWho" required placeholder="พิมพ์ชื่อผู้จัดทำ..."></div>
                            <div><div class="text-xs font-bold text-slate-400 mb-1">ถึง (ผู้รับ)</div><input type="text" id="toWho" required placeholder="พิมพ์ชื่อผู้รับ..."></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><div class="text-xs font-bold text-slate-400 mb-1">หน่วยรับ</div><input type="text" id="department" placeholder="เช่น พัสดุ, คลัง"></div>
                            <div><div class="text-xs font-bold text-slate-400 mb-1">เลขที่ (ถ้ามี)</div><input type="text" id="docNumber" placeholder="..."></div>
                        </div>
                        <div><div class="text-xs font-bold text-slate-400 mb-1">ชื่อเรื่อง</div><input type="text" id="subject" required placeholder="พิมพ์หัวข้อเอกสาร..."></div>
                        <div><div class="text-xs font-bold text-slate-400 mb-1">รายละเอียด</div><textarea id="action" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><div class="text-xs font-bold text-slate-400 mb-1">ลงวันที่</div><input type="date" id="dateInput" required onchange="calculateSeq()"></div>
                            <div><div class="text-xs font-bold text-slate-400 mb-1">เวลาบันทึก</div><input type="text" id="timeInput" disabled class="bg-slate-50 text-slate-500"></div>
                        </div>
                        <div><div class="text-xs font-bold text-slate-400 mb-1">เลขลำดับเอกสาร</div><input type="text" id="seqDisplay" disabled></div>
                        <button type="submit" class="btn-submit">ยืนยันและบันทึกข้อมูล</button>
                    </form>
                </div>

                <div id="listSection" style="display:none;">
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 mb-6 shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <button onclick="changeMonth(-1)" class="p-1 hover:bg-slate-50 rounded-lg"><i data-lucide="chevron-left"></i></button>
                            <div id="calendarMonth" class="font-bold text-slate-700"></div>
                            <button onclick="changeMonth(1)" class="p-1 hover:bg-slate-50 rounded-lg"><i data-lucide="chevron-right"></i></button>
                        </div>
                        <div id="calendarDays" class="grid grid-cols-7 gap-1 text-center text-xs text-slate-400"></div>
                    </div>
                    <div id="dataList" class="space-y-3 pb-10"></div>
                </div>
            </div>
        </div>
    </div>
</div> 
    
    <script>
        if (sessionStorage.getItem('osda_auth') !== 'true') window.location.replace('index.html'); 
        let db = JSON.parse(localStorage.getItem('kmitl_rt_db') || '[]');
        let currentMode = ''; let viewDate = new Date(); let selectedDateStr = new Date().toISOString().split('T')[0];

        // 🔗 ลิงก์ Apps Script ล่าสุด
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZv1V6AhBHu0h-veSAs95_3vuxKBnbYjTidj9K758b1N3lTvq5ueiVyJBaq4p62UEZ/exec';

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
        function goHome() { toggleSidebar(); document.getElementById('appModal').style.display = 'none'; }
        function switchModule(m) { toggleSidebar(); openModule(m); }

        function openModule(mode) {
            currentMode = mode;
            document.getElementById('appModal').style.display = 'block';
            document.getElementById('formSection').style.display = (mode === 'new' || mode === 'backfill') ? 'block' : 'none';
            document.getElementById('listSection').style.display = (mode === 'edit' || mode === 'cancel') ? 'block' : 'none';
            document.getElementById('moduleTitle').innerText = (mode === 'new' ? 'บันทึกใหม่' : mode === 'backfill' ? 'ย้อนหลัง' : mode === 'edit' ? 'แก้ไขข้อมูล' : 'ยกเลิกรายการ');
            
            if(mode === 'new') { resetForm(); document.getElementById('dateInput').value = new Date().toISOString().split('T')[0]; document.getElementById('dateInput').disabled = true; } 
            else if(mode === 'backfill') { resetForm(); document.getElementById('dateInput').disabled = false; }

            if(mode === 'edit' || mode === 'cancel') { renderCalendar(); showList(selectedDateStr); }
            if(window.lucide) lucide.createIcons();
            calculateSeq();
        }

        // ดึงเลขรันแบบออฟไลน์โชว์หน้าเว็บ (ระบบสมองกลจะรันเลขจริงอีกทีตอนส่ง)
        function calculateSeq() {
            try {
                const target = document.getElementById('dateInput').value;
                const seqDisplayEl = document.getElementById('seqDisplay');
                if(!target || !seqDisplayEl || document.getElementById('editId').value) return;

                if (currentMode === 'new') {
                    const sortedAll = [...db].sort((a,b) => a.sequence.localeCompare(b.sequence, undefined, {numeric: true}));
                    let nextBase = sortedAll.length ? parseInt(sortedAll[sortedAll.length-1].sequence.split('.')[0]) + 1 : 1;
                    seqDisplayEl.value = String(nextBase).padStart(4, '0');
                } else {
                    const sameDay = db.filter(r => r.date === target).sort((a,b) => b.sequence.localeCompare(a.sequence, undefined, {numeric: true}));
                    if (sameDay.length) {
                        let last = sameDay[0].sequence;
                        let base = last.includes('.') ? last.substring(0, last.lastIndexOf('.')) : last;
                        seqDisplayEl.value = `${base}.${String(last.includes('.') ? parseInt(last.split('.').pop()) + 1 : 1).padStart(2, '0')}`;
                    } else { 
                        const pastData = db.filter(r => r.date < target).sort((a,b) => b.sequence.localeCompare(a.sequence, undefined, {numeric: true}));
                        let lastBase = pastData.length ? pastData[0].sequence.split('.')[0] : "0000";
                        seqDisplayEl.value = `${String(parseInt(lastBase)).padStart(4, '0')}.01`;
                    }
                }
            } catch (err) {}
        }

        setInterval(() => { 
            const editIdEl = document.getElementById('editId');
            const timeInputEl = document.getElementById('timeInput');
            if(editIdEl && timeInputEl && editIdEl.value === "") timeInputEl.value = new Date().toLocaleTimeString('th-TH', { hour12: false }) + " น."; 
        }, 1000);

        function resetForm() { document.getElementById('docForm').reset(); document.getElementById('editId').value = ''; document.getElementById('dateInput').value = new Date().toISOString().split('T')[0]; }

        function renderCalendar() {
            const year = viewDate.getFullYear(); const month = viewDate.getMonth();
            document.getElementById('calendarMonth').innerText = `${["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month]} ${year + 543}`;
            const cal = document.getElementById('calendarDays'); cal.innerHTML = '<div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>';
            for(let i=0; i<new Date(year, month, 1).getDay(); i++) cal.innerHTML += '<div></div>';
            for(let i=1; i<=new Date(year, month + 1, 0).getDate(); i++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                cal.innerHTML += `<div onclick="selectDate('${dStr}')" class="p-2 cursor-pointer rounded-xl ${dStr===selectedDateStr?'bg-orange-500 text-white font-bold':'hover:bg-slate-100'}">${i}${db.some(r => r.date === dStr) && dStr!==selectedDateStr?'<div class="w-1.5 h-1.5 bg-orange-400 mx-auto rounded-full mt-1"></div>':''}</div>`;
            }
        }
        function selectDate(d) { selectedDateStr = d; renderCalendar(); showList(d); }
        
        function showList(d) {
            const container = document.getElementById('dataList');
            const filtered = db.filter(r => r.date === d).sort((a,b) => b.sequence.localeCompare(a.sequence, undefined, {numeric: true}));
            container.innerHTML = filtered.length ? '' : '<div class="text-center py-10 text-slate-300">ไม่มีข้อมูล</div>';
            filtered.forEach(r => {
                container.innerHTML += `<div class="doc-card"><div class="flex justify-between items-start mb-2"><div class="text-xs font-mono font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded">${r.sequence}</div><button onclick="${currentMode==='edit'?`editItem('${r.id}')`:`deleteItem('${r.id}')`}" class="${currentMode==='edit'?'bg-orange-500':'bg-red-500'} text-white px-3 py-1 rounded-lg text-xs">${currentMode==='edit'?'แก้ไข':'ลบ'}</button></div><div class="text-sm font-bold text-slate-700">${r.subject}</div><div class="text-[10px] text-slate-400 mt-2 flex justify-between bg-slate-50 p-1 rounded"><div>${r.time}</div><div>${r.from_who} → ${r.toWho || r.to_who || ''}</div></div></div>`;
            });
        }

        window.editItem = (id) => {
            const r = db.find(x => x.id === id); if(!r) return;
            document.getElementById('formSection').style.display = 'block'; document.getElementById('listSection').style.display = 'none';
            document.getElementById('editId').value = r.id; document.getElementById('fromWho').value = r.from_who || ''; document.getElementById('toWho').value = r.toWho || r.to_who || ''; document.getElementById('department').value = r.department || ''; document.getElementById('docNumber').value = r.doc_number || ''; document.getElementById('subject').value = r.subject || ''; document.getElementById('action').value = r.action || ''; document.getElementById('dateInput').value = r.date; document.getElementById('dateInput').disabled = true; document.getElementById('timeInput').value = r.time; document.getElementById('seqDisplay').value = r.sequence; window.scrollTo(0,0);
        };
        window.deleteItem = (id) => { if(confirm('ยืนยันการลบ?')) { db = db.filter(x => x.id !== id); localStorage.setItem('kmitl_rt_db', JSON.stringify(db)); showList(selectedDateStr); renderCalendar(); } };

        // 🟢 ระบบบันทึกเข้า Google Sheets (แบบไร้บั๊ก)
        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) lucide.createIcons();
            document.getElementById('docForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    const id = document.getElementById('editId').value || Date.now().toString();
                    const record = { 
                        sheetType: 'sender', 
                        id: id, 
                        from_who: document.getElementById('fromWho').value, 
                        toWho: document.getElementById('toWho').value, 
                        department: document.getElementById('department').value,
                        doc_number: document.getElementById('docNumber').value,
                        subject: document.getElementById('subject').value, 
                        action: document.getElementById('action').value, 
                        date: document.getElementById('dateInput').value, 
                        time: document.getElementById('timeInput').value, 
                        sequence: document.getElementById('seqDisplay').value 
                    };
                    
                    Swal.fire({ title: 'กำลังบันทึกเข้า Cloud...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(record) }).then(r => r.json());
                    if(res.status !== 'success') throw new Error(res.message);

                    const idx = db.findIndex(x => String(x.id) === String(id)); 
                    if(idx !== -1) db[idx] = record; else db.push(record); 
                    localStorage.setItem('kmitl_rt_db', JSON.stringify(db));

                    Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'บันทึกเข้า Google Sheets เรียบร้อย', timer: 2000 });
                    goHome();
